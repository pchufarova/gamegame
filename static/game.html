<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Word Game</title>

<style>
body{
    font-family:Segoe UI;
    background:linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:20px;
}

.container{
    background:#fff;
    max-width:900px;
    margin:auto;
    padding:20px;
    border-radius:20px;
}

.screen{display:none}
.screen.active{display:block}

.hidden{display:none}

.player{
    padding:10px;
    background:#eee;
    margin:5px;
    cursor:pointer;
    border-radius:10px;
    display:flex;
    align-items:center;
    gap:10px;
}

.player.selected{
    background:#4caf50;
    color:#fff;
}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:#fff;
    cursor:pointer;
    margin:5px;
}

#resultBox{
    margin-top:15px;
    padding:10px;
    border-radius:10px;
    background:#f3f3f3;
}
</style>
</head>

<body>

<div class="container">

<h1>Word Game</h1>

<!-- MENU -->
<div id="menu" class="screen active">
    <input id="nickname" placeholder="Nickname">
    <button onclick="createRoom()">Create</button>
    <input id="roomCode" placeholder="Room code">
    <button onclick="joinRoom()">Join</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
    <h2>Lobby</h2>
    <div>Room: <b id="roomCodeDisplay"></b></div>
    <div id="playersLobby"></div>

    <button id="startBtn" onclick="startGame()">START GAME</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <h2 id="phaseText">Waiting...</h2>

    <div>⏱ <span id="timer">0</span></div>

    <!-- COLLECT -->
    <div id="collectBox" class="hidden">
        <h3>Напиши фразу</h3>

        <div>⏳ <span id="collectTimer">30</span></div>

        <input id="phraseInput" placeholder="Твоя фраза">
        <button onclick="sendPhrase()">Send</button>

        <div id="myPhrase" style="margin-top:10px;font-weight:bold;"></div>
    </div>

    <!-- VOTE -->
    <div id="voteBox" class="hidden">
        <h3 id="phraseToGuess"></h3>
        <div id="playersVote"></div>
        <button onclick="sendVote()">Vote</button>
    </div>

    <!-- RESULT -->
    <div id="resultBox" class="hidden"></div>

</div>

</div>

<script>

let ws;
let roomCode;
let playerId;
let players = [];
let selectedVote = null;
let isHost = false;
let currentPhase = null;

// ================= UI =================
function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function showResult(text){
    const box = document.getElementById("resultBox");
    box.classList.remove("hidden");
    box.innerHTML += `<div>${text}</div>`;
}

// ================= WS =================
function connectWS(){
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/${roomCode}/${playerId}`);

    ws.onmessage = (e)=>{
        const msg = JSON.parse(e.data);

        if(msg.type==="player_joined"){
            updateLobby();
        }

        if(msg.type==="start_collecting"){
            currentPhase = "collect";

            showScreen("game");

            document.getElementById("phaseText").innerText = "COLLECT PHASE";

            document.getElementById("collectBox").classList.remove("hidden");
            document.getElementById("voteBox").classList.add("hidden");

            document.getElementById("resultBox").classList.add("hidden");
            document.getElementById("resultBox").innerHTML = "";
        }

        if(msg.type==="timer_update"){
            const t = msg.data.seconds;

            document.getElementById("timer").innerText = t;

            if(currentPhase==="collect"){
                document.getElementById("collectTimer").innerText = t;
            }
        }

        if(msg.type==="start_voting"){
            currentPhase = "vote";

            document.getElementById("phaseText").innerText = "VOTING";

            document.getElementById("collectBox").classList.add("hidden");
            document.getElementById("voteBox").classList.remove("hidden");

            document.getElementById("phraseToGuess").innerText =
                "Guess: " + msg.data.phrase;

            renderPlayers(msg.data.author_id);
        }

        if(msg.type==="reveal_author"){
            currentPhase = "reveal";

            document.getElementById("voteBox").classList.add("hidden");

            showResult(
                `Фраза: ${msg.data.phrase}<br>` +
                `Автор: <b>${msg.data.author}</b><br>` +
                (msg.data.correct ? "🎉 Кто-то угадал!" : "😈 Никто не угадал")
            );
        }

        if(msg.type==="game_end"){
            showResult("🏁 ИГРА ЗАВЕРШЕНА");
            showResult(JSON.stringify(msg.data.final_scores));
        }
    };
}

// ================= LOBBY =================
async function updateLobby(){
    const res = await fetch(`/api/rooms/${roomCode}`);
    const data = await res.json();

    players = data.players;

    const c = document.getElementById("playersLobby");
    c.innerHTML = "";

    players.forEach(p=>{
        const d = document.createElement("div");
        d.className="player";
        d.innerHTML = `
            <div style="width:30px;height:30px;border-radius:50%;background:${p.avatar_color}"></div>
            <div>${p.nickname}</div>
        `;
        c.appendChild(d);
    });
}

// ================= PHRASE =================
function sendPhrase(){
    const text = document.getElementById("phraseInput").value;

    ws.send(JSON.stringify({
        type:"submit_phrase",
        data:{text}
    }));

    document.getElementById("myPhrase").innerText =
        "Твоя фраза: " + text;
}

// ================= VOTE =================
function renderPlayers(authorId){
    const c = document.getElementById("playersVote");
    c.innerHTML = "";

    players.forEach(p=>{

        // ❌ нельзя голосовать за себя
        if(p.id === playerId) return;

        const d=document.createElement("div");
        d.className="player";

        d.innerHTML=`
            <div style="width:35px;height:35px;border-radius:50%;background:${p.avatar_color}"></div>
            <div>${p.nickname}</div>
        `;

        d.onclick=()=>{
            selectedVote = p.id;
            document.querySelectorAll("#playersVote .player")
                .forEach(x=>x.classList.remove("selected"));
            d.classList.add("selected");
        };

        c.appendChild(d);
    });
}

function sendVote(){
    ws.send(JSON.stringify({
        type:"vote",
        data:{voted_player_id:selectedVote}
    }));
}

// ================= START =================
function startGame(){
    if (!isHost) return;
    ws.send(JSON.stringify({type:"start_game"}));
}

// ================= INIT =================
async function createRoom(){
    const res = await fetch("/api/rooms/create",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({host_nickname:document.getElementById("nickname").value})
    });

    const data = await res.json();

    roomCode=data.room_code;
    playerId=data.player_id;
    isHost=true;

    document.getElementById("roomCodeDisplay").innerText=roomCode;

    connectWS();
    showScreen("lobby");
    updateLobby();
}

async function joinRoom(){
    const res = await fetch("/api/rooms/join",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            nickname:document.getElementById("nickname").value,
            room_code:document.getElementById("roomCode").value
        })
    });

    const data = await res.json();

    roomCode=document.getElementById("roomCode").value;
    playerId=data.player_id;
    isHost=false;

    connectWS();
    showScreen("lobby");
    updateLobby();
}

</script>

</body>
</html>
