<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Game</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    background:#fff;
    border-radius:20px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);
    max-width:800px;
    width:100%;
    padding:30px;
}

h1{text-align:center;color:#667eea;margin-bottom:20px}

.screen{display:none}
.screen.active{display:block}

.btn{
    background:linear-gradient(135deg,#667eea,#764ba2);
    color:#fff;
    border:none;
    padding:12px 20px;
    border-radius:15px;
    cursor:pointer;
    margin:5px;
    width:100%;
}

.btn-small{width:auto;padding:8px 15px;font-size:14px}

.room-code{
    text-align:center;
    font-size:28px;
    font-weight:bold;
    color:#667eea;
    background:#f5f5f5;
    padding:15px;
    border-radius:12px;
    letter-spacing:4px;
    margin:15px 0;
    cursor:pointer;
}

.players{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
    margin:15px 0;
}

.player{
    background:#eee;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

.timer{
    font-size:40px;
    text-align:center;
    margin:15px 0;
    color:#667eea;
}

.phrase{
    text-align:center;
    font-size:26px;
    padding:15px;
    border:2px dashed #667eea;
    margin:15px 0;
    display:none;
}

.score{
    display:flex;
    justify-content:space-around;
    margin:10px 0;
}
</style>
</head>

<body>

<div class="container">
<h1>Word Game</h1>

<!-- MENU -->
<div id="menu" class="screen active">
    <input id="nickname" placeholder="Nickname">
    <button class="btn" onclick="createRoom()">Create Room</button>

    <input id="roomCodeInput" placeholder="Room code">
    <button class="btn" onclick="joinRoom()">Join Room</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
    <h2>Lobby</h2>

    <div class="room-code" onclick="copyCode()" id="roomCodeBox">------</div>

    <div id="players" class="players"></div>

    <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <div class="timer" id="timer">60</div>

    <div class="phrase" id="phraseBox"></div>

    <h3 style="text-align:center">Vote player</h3>
    <div class="players" id="votePlayers"></div>

    <button class="btn" onclick="sendVote()">Send vote</button>

    <div class="score" id="scoreBoard"></div>
</div>

<!-- END -->
<div id="end" class="screen">
    <h2 style="text-align:center">Game Over</h2>
    <div id="results"></div>
</div>

</div>

<script>

let ws;
let roomCode;
let playerId;
let players = [];
let selectedVote = null;

// =========================
function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// ========================= CREATE
async function createRoom(){
    const nick = document.getElementById("nickname").value;

    const res = await fetch("/api/rooms/create",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({host_nickname:nick})
    });

    const data = await res.json();

    roomCode = data.room_code;
    playerId = data.player_id;

    document.getElementById("roomCodeBox").innerText = roomCode;

    connectWS();
    show("lobby");
    updateLobby();
}

// ========================= JOIN
async function joinRoom(){
    const nick = document.getElementById("nickname").value;
    const code = document.getElementById("roomCodeInput").value;

    const res = await fetch("/api/rooms/join",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({nickname:nick,room_code:code})
    });

    const data = await res.json();

    roomCode = code;
    playerId = data.player_id;

    document.getElementById("roomCodeBox").innerText = roomCode;

    connectWS();
    show("lobby");
    updateLobby();
}

// ========================= WS
function connectWS(){
    const protocol = location.protocol === "https:" ? "wss" : "ws";

    ws = new WebSocket(`${protocol}://${location.host}/ws/${roomCode}/${playerId}`);

    ws.onmessage = (e)=>{
        handle(JSON.parse(e.data));
    };
}

// ========================= HANDLE
function handle(m){

    if(m.type === "start_voting"){
        show("game");

        document.getElementById("phraseBox").style.display = "block";
        document.getElementById("phraseBox").innerText = m.data.phrase;

        renderVotePlayers();
    }

    if(m.type === "timer_update"){
        document.getElementById("timer").innerText = m.data.seconds;
    }

    if(m.type === "reveal_author"){
        alert("Author: " + m.data.author);
    }

    if(m.type === "game_end"){
        show("end");
        document.getElementById("results").innerText =
            JSON.stringify(m.data.final_scores, null, 2);
    }
}

// ========================= LOBBY
async function updateLobby(){
    const res = await fetch(`/api/rooms/${roomCode}`);
    const data = await res.json();

    players = data.players;

    const box = document.getElementById("players");
    box.innerHTML = "";

    players.forEach(p=>{
        const div = document.createElement("div");
        div.className = "player";
        div.innerText = `${p.nickname} (${p.score})`;
        box.appendChild(div);
    });

    document.getElementById("startBtn").style.display =
        players.length >= 2 ? "block" : "none";
}

// ========================= VOTE UI
function renderVotePlayers(){
    const box = document.getElementById("votePlayers");
    box.innerHTML = "";

    players.forEach(p=>{
        const div = document.createElement("div");
        div.className = "player";
        div.innerText = p.nickname;

        div.onclick = ()=>{
            selectedVote = p.id;
            document.querySelectorAll(".player").forEach(x=>x.style.border="none");
            div.style.border = "2px solid #4caf50";
        };

        box.appendChild(div);
    });
}

// ========================= VOTE
function sendVote(){
    if(!selectedVote) return alert("Pick player");

    ws.send(JSON.stringify({
        type:"vote",
        data:{voted_player_id:selectedVote}
    }));
}

// ========================= START
function startGame(){
    ws.send(JSON.stringify({type:"start_game"}));
}

// ========================= COPY
function copyCode(){
    navigator.clipboard.writeText(roomCode);
    alert("Copied!");
}

</script>

</body>
</html>
