<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Word Game</title>

<style>
body{
    font-family:Segoe UI;
    background:linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:20px;
    color:#333;
}

.container{
    background:#fff;
    max-width:900px;
    margin:auto;
    padding:20px;
    border-radius:20px;
}

.screen{display:none}
.screen.active{display:block}

.btn{
    padding:12px;
    border:none;
    border-radius:10px;
    background:#667eea;
    color:#fff;
    cursor:pointer;
    margin:5px;
}

.players-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
}

.player{
    padding:10px;
    border-radius:10px;
    background:#eee;
    text-align:center;
    cursor:pointer;
}

.player.selected{
    background:#4caf50;
    color:#fff;
}
</style>
</head>

<body>

<div class="container">

<h1>Word Game</h1>

<div id="menu" class="screen active">
    <input id="nickname" placeholder="Nickname">
    <button class="btn" onclick="createRoom()">Create</button>
    <input id="roomCode" placeholder="Room code">
    <button class="btn" onclick="joinRoom()">Join</button>
</div>

<div id="lobby" class="screen">
    <h2>Lobby</h2>

    <div>Room: <b id="roomCodeDisplay">---</b></div>

    <div id="playersLobby"></div>

    <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>
</div>

<div id="game" class="screen">
    <div id="timer">0</div>

    <div id="phraseBox" style="display:none"></div>

    <div class="players-grid" id="playersVote"></div>

    <button class="btn" onclick="sendVote()">Vote</button>
</div>

</div>

<script>

let ws;
let roomCode;
let playerId;
let players = [];
let selectedVote = null;
let isHost = false;

// NAV
function show(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// CREATE
async function createRoom(){
    const nick = document.getElementById("nickname").value;

    const res = await fetch("/api/rooms/create", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({host_nickname:nick})
    });

    const data = await res.json();

    roomCode = data.room_code;
    playerId = data.player_id;
    isHost = true;

    document.getElementById("roomCodeDisplay").innerText = roomCode;

    connectWS();

    ws.onopen = async ()=>{
        show("lobby");
        await updateLobby();
    };
}

// JOIN
async function joinRoom(){
    const nick = document.getElementById("nickname").value;
    const code = document.getElementById("roomCode").value;

    const res = await fetch("/api/rooms/join", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({nickname:nick, room_code:code})
    });

    const data = await res.json();

    roomCode = code;
    playerId = data.player_id;
    isHost = false;

    document.getElementById("roomCodeDisplay").innerText = roomCode;

    connectWS();

    ws.onopen = async ()=>{
        show("lobby");
        await updateLobby();
    };
}

function connectWS(){

    // ❗ защита от повторного подключения
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
        console.log("WS already connected");
        return;
    }

    if (ws) {
        try { ws.close(); } catch(e) {}
    }

    const url = `wss://${location.host}/ws/${roomCode}/${playerId}`;

    ws = new WebSocket(url);

    ws.onopen = () => {
        console.log("WS connected");
    };

    ws.onclose = () => {
        console.log("WS closed");
    };

    ws.onerror = (e) => {
        console.log("WS error", e);
    };

    ws.onmessage = (e) => {
        handle(JSON.parse(e.data));
    };
}

// LOBBY
async function updateLobby(){
    const res = await fetch(`/api/rooms/${roomCode}`);
    const data = await res.json();

    players = data.players;

    const container = document.getElementById("playersLobby");
    container.innerHTML = "";

    players.forEach(p=>{
        const div = document.createElement("div");
        div.className = "player";
        div.innerText = p.nickname;
        container.appendChild(div);
    });

    const btn = document.getElementById("startBtn");

    if(!isHost){
        btn.style.display = "none";
    } else {
        btn.style.display = "block";
        btn.disabled = players.length < 2;
    }
}

// VOTE UI
function renderPlayersVote(){
    const c = document.getElementById("playersVote");
    c.innerHTML = "";

    players.forEach(p=>{
        const d = document.createElement("div");
        d.className = "player";
        d.innerText = p.nickname;

        d.onclick = ()=>{
            selectedVote = p.id;
            document.querySelectorAll(".player").forEach(x=>x.classList.remove("selected"));
            d.classList.add("selected");
        };

        c.appendChild(d);
    });
}

// SEND VOTE
function sendVote(){
    if(ws && ws.readyState === WebSocket.OPEN){
        ws.send(JSON.stringify({
            type:"vote",
            data:{ voted_player_id:selectedVote }
        }));
    }
}

function startGame(){
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        console.log("WS not ready");
        return;
    }

    ws.send(JSON.stringify({
        type: "start_game"
    }));
}

</script>

</body>
</html>
