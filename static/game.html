<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Word Game</title>

<style>
body{
    font-family:Segoe UI;
    background:linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:20px;
}

.container{
    background:#fff;
    max-width:900px;
    margin:auto;
    padding:20px;
    border-radius:20px;
}

.screen{display:none}
.screen.active{display:block}

.hidden{display:none}

.player{
    padding:10px;
    margin:5px;
    border-radius:8px;
    background:#eee;
    display:flex;
    gap:10px;
    align-items:center;
    cursor:pointer;
}

.player.selected{background:#4caf50;color:#fff}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    cursor:pointer;
    margin:5px;
}

#myPhrase{
    margin-top:10px;
    padding:10px;
    background:#f3f3f3;
    border-radius:10px;
}

#resultBox{
    margin-top:15px;
    padding:15px;
    background:#f8f8f8;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Word Game</h1>

<!-- MENU -->
<div id="menu" class="screen active">
    <input id="nickname" placeholder="Nickname">
    <button onclick="createRoom()">Create</button>
    <input id="roomCode" placeholder="Room code">
    <button onclick="joinRoom()">Join</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
    <h2>Lobby</h2>
    <div>Room: <b id="roomCodeDisplay"></b></div>
    <div id="playersLobby"></div>
    <button id="startBtn" onclick="startGame()">START GAME</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <h2 id="phaseText">Waiting...</h2>

    <div>⏳ <span id="timer">0</span></div>

    <!-- COLLECT -->
    <div id="collectBox" class="hidden">
        <h3>Напиши фразу</h3>
        <div>осталось: <span id="collectTimer">30</span></div>

        <input id="phraseInput" placeholder="Твоя фраза">
        <button id="sendBtn" onclick="sendPhrase()">Send</button>

        <div id="myPhrase"></div>
    </div>

    <!-- VOTE -->
    <div id="voteBox" class="hidden">
        <h3 id="phraseToGuess"></h3>
        <div id="playersVote"></div>
        <button onclick="sendVote()">Vote</button>
    </div>

    <!-- RESULT -->
    <div id="resultBox" class="hidden"></div>

</div>

</div>

<script>

let ws;
let roomCode;
let playerId;
let players = [];
let isHost = false;
let selectedVote = null;
let currentAuthorId = null;

let phraseSent = false;

// ================= START BUTTON =================
function updateStartButton(){
    const btn = document.getElementById("startBtn");
    btn.style.display = isHost ? "block" : "none";
    btn.disabled = players.length < 2;
}

// ================= TIMER =================
let timerInterval = null;

function startTimer(sec){
    clearInterval(timerInterval);

    let t = sec;

    document.getElementById("timer").innerText = t;
    document.getElementById("collectTimer").innerText = t;

    timerInterval = setInterval(()=>{
        t--;

        document.getElementById("timer").innerText = t;

        if(document.getElementById("collectTimer"))
            document.getElementById("collectTimer").innerText = t;

        if(t <= 0) clearInterval(timerInterval);
    },1000);
}

// ================= WS =================
function connectWS(){
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/${roomCode}/${playerId}`);

    ws.onmessage = (e)=>{
        const msg = JSON.parse(e.data);

        if(msg.type==="player_joined"){
            updateLobby();
            updateStartButton();
        }

        // RESET ROUND STATE
        function resetRound(){
            phraseSent = false;
            selectedVote = null;

            document.getElementById("phraseInput").disabled = false;
            document.getElementById("sendBtn").disabled = false;
            document.getElementById("phraseInput").value = "";
            document.getElementById("myPhrase").innerHTML = "";
        }

        // COLLECT
        if(msg.type==="start_collecting"){
            show("game");
            resetRound();

            document.getElementById("phaseText").innerText="COLLECT";

            document.getElementById("collectBox").classList.remove("hidden");
            document.getElementById("voteBox").classList.add("hidden");
            document.getElementById("resultBox").classList.add("hidden");

            startTimer(30);
        }

        // VOTE
        if(msg.type==="start_voting"){
            document.getElementById("phaseText").innerText="VOTE";

            document.getElementById("collectBox").classList.add("hidden");
            document.getElementById("voteBox").classList.remove("hidden");

            currentAuthorId = msg.data.author_id;

            document.getElementById("phraseToGuess").innerText =
                "Фраза: " + msg.data.phrase;

            renderPlayers();

            startTimer(60);
        }

        // RESULT
        if(msg.type==="reveal_author"){
            document.getElementById("resultBox").classList.remove("hidden");

            const ok = msg.data.correctVoters.includes(playerId);

            document.getElementById("resultBox").innerHTML = `
                <h3>Раунд завершён</h3>
                <p><b>Фраза:</b> ${msg.data.phrase}</p>
                <p><b>Автор:</b> ${msg.data.author}</p>
                <p style="color:${ok?'green':'red'}">
                    ${ok ? "+2 очка" : "0 очков"}
                </p>
            `;
        }

        // GAME END (FIX JSON UI)
        if(msg.type==="game_end"){
            document.getElementById("resultBox").classList.remove("hidden");

            let html = "<h2>GAME OVER</h2>";

            const sorted = Object.entries(msg.data.final_scores)
                .sort((a,b)=>b[1]-a[1]);

            sorted.forEach(([name,score],i)=>{
                html += `<div class="player">#${i+1} ${name} — ${score}</div>`;
            });

            document.getElementById("resultBox").innerHTML = html;
        }
    };
}

// ================= LOBBY =================
async function updateLobby(){
    const res = await fetch(`/api/rooms/${roomCode}`);
    const data = await res.json();

    players = data.players || [];

    const c = document.getElementById("playersLobby");
    c.innerHTML = "";

    players.forEach(p=>{
        const d = document.createElement("div");
        d.className="player";
        d.innerText=p.nickname;
        c.appendChild(d);
    });

    updateStartButton();
}

// ================= PHRASE =================
function sendPhrase(){
    if(phraseSent) return;

    const text = document.getElementById("phraseInput").value;
    if(!text) return;

    ws.send(JSON.stringify({
        type:"submit_phrase",
        data:{text}
    }));

    phraseSent = true;
    document.getElementById("sendBtn").disabled = true;

    document.getElementById("myPhrase").innerHTML =
        `<b>Твоя фраза:</b> ${text}`;
}

// ================= VOTE FIX =================
function renderPlayers(){
    const c = document.getElementById("playersVote");
    c.innerHTML = "";

    players.forEach(p=>{

        const d = document.createElement("div");
        d.className="player";

        d.innerText = p.nickname;

        // 🔥 ЖЁСТКО: автор НЕ может голосовать
        if(p.id === playerId || p.id === currentAuthorId){
            d.style.opacity = "0.3";
            d.style.pointerEvents = "none";
        }

        d.onclick = ()=>{
            selectedVote = p.id;

            document.querySelectorAll("#playersVote .player")
                .forEach(x=>x.classList.remove("selected"));

            d.classList.add("selected");
        };

        c.appendChild(d);
    });
}

function sendVote(){
    if(selectedVote === null) return;

    ws.send(JSON.stringify({
        type:"vote",
        data:{voted_player_id:selectedVote}
    }));

    document.querySelectorAll("#playersVote .player")
        .forEach(x=>x.style.pointerEvents = "none");
}

// ================= START =================
function startGame(){
    if(!isHost) return;
    ws.send(JSON.stringify({type:"start_game"}));
}

// ================= NAV =================
function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// ================= CREATE / JOIN =================
async function createRoom(){
    const res = await fetch("/api/rooms/create",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({host_nickname:document.getElementById("nickname").value})
    });

    const data = await res.json();

    roomCode=data.room_code;
    playerId=data.player_id;
    isHost=true;

    document.getElementById("roomCodeDisplay").innerText=roomCode;

    connectWS();
    show("lobby");
    updateLobby();
}

async function joinRoom(){
    const res = await fetch("/api/rooms/join",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            nickname:document.getElementById("nickname").value,
            room_code:document.getElementById("roomCode").value
        })
    });

    const data = await res.json();

    roomCode=document.getElementById("roomCode").value;
    playerId=data.player_id;
    isHost=false;

    connectWS();
    show("lobby");
    updateLobby();
}

</script>

</body>
</html>
