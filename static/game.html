<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Word Game</title>

<style>
body{
    font-family:Segoe UI;
    background:linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:20px;
}

.container{
    background:#fff;
    max-width:900px;
    margin:auto;
    padding:20px;
    border-radius:20px;
}

.screen{display:none}
.screen.active{display:block}

.player{
    padding:10px;
    background:#eee;
    margin:5px;
    cursor:pointer;
    border-radius:8px;
    display:flex;
    gap:10px;
    align-items:center;
}

.player.selected{
    background:#4caf50;
    color:#fff;
}

.hidden{display:none;}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    cursor:pointer;
    margin:5px;
}
</style>
</head>

<body>

<div class="container">

<h1>Word Game</h1>

<!-- MENU -->
<div id="menu" class="screen active">
    <input id="nickname" placeholder="Nickname">
    <button onclick="createRoom()">Create</button>
    <input id="roomCode" placeholder="Room code">
    <button onclick="joinRoom()">Join</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
    <h2>Lobby</h2>

    <div>Room: <b id="roomCodeDisplay"></b></div>
    <div id="playersLobby"></div>

    <button id="startBtn" onclick="startGame()">START GAME</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <h2 id="phaseText">Waiting...</h2>

    <div id="timer">0</div>

    <!-- COLLECT -->
    <div id="collectBox" class="hidden">
        <h3>Напиши фразу</h3>
        <div>⏳ <span id="collectTimer">30</span></div>

        <input id="phraseInput" placeholder="Твоя фраза">
        <button onclick="sendPhrase()">Send</button>
    </div>

    <!-- VOTE -->
    <div id="voteBox" class="hidden">
        <div id="phraseToGuess"></div>
        <div id="playersVote"></div>
        <button onclick="sendVote()">Vote</button>
    </div>

</div>

</div>

<script>

let ws;
let roomCode;
let playerId;
let players = [];
let selectedVote = null;
let isHost = false;

// ================= UI =================
function showScreen(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function updateStartButton(){
    const btn = document.getElementById("startBtn");

    if (!isHost) {
        btn.style.display = "none";
        return;
    }

    btn.style.display = "block";
    btn.disabled = players.length < 2;
}

// ================= WS =================
function connectWS(){
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/${roomCode}/${playerId}`);

    ws.onmessage = (e)=>{
        const msg = JSON.parse(e.data);

        if(msg.type==="player_joined"){
            updateLobby();
            updateStartButton();
        }

        if(msg.type==="start_collecting"){
            showScreen("game");

            document.getElementById("phaseText").innerText = "COLLECT PHASE";

            document.getElementById("collectBox").classList.remove("hidden");
            document.getElementById("voteBox").classList.add("hidden");
        }

        if(msg.type==="timer_update"){
            document.getElementById("timer").innerText = msg.data.seconds;

            const t = document.getElementById("collectTimer");
            if(t) t.innerText = msg.data.seconds;
        }

        if(msg.type==="start_voting"){
            document.getElementById("phaseText").innerText = "VOTING";

            document.getElementById("collectBox").classList.add("hidden");
            document.getElementById("voteBox").classList.remove("hidden");

            document.getElementById("phraseToGuess").innerText =
                "Guess: " + msg.data.phrase;

            renderPlayers();
        }

        if(msg.type==="reveal_author"){
            alert(`Фраза: ${msg.data.phrase}\nАвтор: ${msg.data.author}`);
        }

        if(msg.type==="game_end"){
            alert("GAME OVER");
            console.log(msg.data);
        }
    };
}

// ================= LOBBY =================
async function updateLobby(){
    const res = await fetch(`/api/rooms/${roomCode}`);
    const data = await res.json();

    players = data.players;

    const c = document.getElementById("playersLobby");
    c.innerHTML = "";

    players.forEach(p=>{
        const d = document.createElement("div");
        d.className="player";

        d.innerHTML = `
            <div style="
                width:30px;height:30px;
                border-radius:50%;
                background:${p.avatar_color};
            "></div>
            <div>${p.nickname}</div>
        `;

        c.appendChild(d);
    });

    updateStartButton();
}

// ================= PHRASES =================
function sendPhrase(){
    ws.send(JSON.stringify({
        type:"submit_phrase",
        data:{text:document.getElementById("phraseInput").value}
    }));

    document.getElementById("phraseInput").value="";
}

// ================= VOTE =================
function renderPlayers(){
    const c = document.getElementById("playersVote");
    c.innerHTML="";

    players.forEach(p=>{
        const d=document.createElement("div");
        d.className="player";

        d.innerHTML=`
            <div style="
                width:35px;height:35px;
                border-radius:50%;
                background:${p.avatar_color};
            "></div>
            <div>${p.nickname}</div>
        `;

        d.onclick=()=>{
            selectedVote = p.id;

            document.querySelectorAll("#playersVote .player")
                .forEach(x=>x.classList.remove("selected"));

            d.classList.add("selected");
        };

        c.appendChild(d);
    });
}

function sendVote(){
    ws.send(JSON.stringify({
        type:"vote",
        data:{voted_player_id:selectedVote}
    }));
}

// ================= ACTIONS =================
function startGame(){
    if (!isHost) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    ws.send(JSON.stringify({type:"start_game"}));
}

async function createRoom(){
    const res = await fetch("/api/rooms/create",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({host_nickname:document.getElementById("nickname").value})
    });

    const data = await res.json();

    roomCode=data.room_code;
    playerId=data.player_id;
    isHost=true;

    document.getElementById("roomCodeDisplay").innerText=roomCode;

    connectWS();
    showScreen("lobby");
    updateLobby();
    updateStartButton();
}

async function joinRoom(){
    const res = await fetch("/api/rooms/join",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            nickname:document.getElementById("nickname").value,
            room_code:document.getElementById("roomCode").value
        })
    });

    const data = await res.json();

    roomCode=document.getElementById("roomCode").value;
    playerId=data.player_id;
    isHost=false;

    connectWS();
    showScreen("lobby");
    updateLobby();
    updateStartButton();
}

</script>

</body>
</html>
