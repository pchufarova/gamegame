<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Word Game</title>

<style>
body{
    font-family:Segoe UI;
    background:linear-gradient(135deg,#667eea,#764ba2);
    margin:0;
    padding:20px;
}

.container{
    background:#fff;
    max-width:900px;
    margin:auto;
    padding:20px;
    border-radius:20px;
}

.screen{display:none}
.screen.active{display:block}

.hidden{display:none}

.player{
    padding:10px;
    margin:5px;
    border-radius:8px;
    background:#eee;
    display:flex;
    gap:10px;
    align-items:center;
    cursor:pointer;
}

.player.selected{background:#4caf50;color:#fff}

button{
    padding:10px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    cursor:pointer;
    margin:5px;
}

#myPhrase{
    margin-top:10px;
    padding:10px;
    background:#f3f3f3;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>Word Game</h1>

<!-- MENU -->
<div id="menu" class="screen active">
    <input id="nickname" placeholder="Nickname">
    <button onclick="createRoom()">Create</button>
    <input id="roomCode" placeholder="Room code">
    <button onclick="joinRoom()">Join</button>
</div>

<!-- LOBBY -->
<div id="lobby" class="screen">
    <h2>Lobby</h2>
    <div>Room: <b id="roomCodeDisplay"></b></div>
    <div id="playersLobby"></div>

    <!-- ВАЖНО: кнопка есть, но скрывается JS -->
    <button id="startBtn" onclick="startGame()">START GAME</button>
</div>

<!-- GAME -->
<div id="game" class="screen">

    <h2 id="phaseText">Waiting...</h2>

    <div>
        ⏳ Timer: <span id="timer">0</span>
    </div>

    <!-- COLLECT -->
    <div id="collectBox" class="hidden">
        <h3>Напиши фразу</h3>
        <div>⏳ осталось: <span id="collectTimer">30</span></div>

        <input id="phraseInput" placeholder="Твоя фраза">
        <button onclick="sendPhrase()">Send</button>

        <!-- твоя фраза -->
        <div id="myPhrase"></div>
    </div>

    <!-- VOTE -->
    <div id="voteBox" class="hidden">
        <h3 id="phraseToGuess"></h3>
        <div id="playersVote"></div>
        <button onclick="sendVote()">Vote</button>
    </div>

    <!-- RESULT -->
    <div id="resultBox" class="hidden"></div>

</div>

</div>

<script>

let ws;
let roomCode;
let playerId;
let players = [];
let isHost = false;
let selectedVote = null;

// ================= START BUTTON FIX =================
function updateStartButton(){
    const btn = document.getElementById("startBtn");
    if(!btn) return;

    if(!isHost){
        btn.style.display="none";
        return;
    }

    btn.style.display="block";
    btn.disabled = players.length < 2;
}

// ================= TIMER FIX (client ticking) =================
let timerInterval = null;
let currentTimer = 0;

function startLocalTimer(seconds){
    clearInterval(timerInterval);
    currentTimer = seconds;

    timerInterval = setInterval(()=>{
        currentTimer--;

        document.getElementById("timer").innerText = currentTimer;

        const ct = document.getElementById("collectTimer");
        if(ct) ct.innerText = currentTimer;

        if(currentTimer <= 0){
            clearInterval(timerInterval);
        }
    }, 1000);
}

// ================= WS =================
function connectWS(){
    const proto = location.protocol === "https:" ? "wss" : "ws";

    ws = new WebSocket(`${proto}://${location.host}/ws/${roomCode}/${playerId}`);

    ws.onmessage = (e)=>{
        const msg = JSON.parse(e.data);

        if(msg.type==="player_joined" || msg.type==="player_left"){
            updateLobby();
            return;
        }

        // ===== COLLECT =====
        if(msg.type==="start_collecting"){
            show("game");

            document.getElementById("phaseText").innerText="COLLECT";

            document.getElementById("collectBox").classList.remove("hidden");
            document.getElementById("voteBox").classList.add("hidden");
            document.getElementById("resultBox").classList.add("hidden");

            startLocalTimer(30);
        }

        // ===== VOTE =====
        if(msg.type==="start_voting"){
            document.getElementById("phaseText").innerText="VOTE";

            document.getElementById("collectBox").classList.add("hidden");
            document.getElementById("voteBox").classList.remove("hidden");

            document.getElementById("phraseToGuess").innerText =
                "Фраза: " + msg.data.phrase;

            renderPlayers(msg.data.author_id);
            startLocalTimer(60);
        }

        // ===== RESULT (NO ALERTS) =====
        if(msg.type==="reveal_author"){
            document.getElementById("resultBox").classList.remove("hidden");

            document.getElementById("resultBox").innerHTML = `
                <h3>Результат раунда</h3>
                <p><b>Фраза:</b> ${msg.data.phrase}</p>
                <p><b>Автор:</b> ${msg.data.author}</p>
                <p style="color:green">
                    +${msg.data.correctVoters.includes(playerId) ? 2 : 0} очков
                </p>
            `;
        }

        // ===== GAME END =====
        if(msg.type==="game_end"){
            document.getElementById("resultBox").classList.remove("hidden");

            document.getElementById("resultBox").innerHTML =
                `<h2>GAME OVER</h2><pre>${JSON.stringify(msg.data.final_scores,null,2)}</pre>`;
        }
    };
}

// ================= LOBBY =================
async function updateLobby(){
    const res = await fetch(`/api/rooms/${roomCode}`);
    const data = await res.json();

    players = data.players || [];

    const c = document.getElementById("playersLobby");
    c.innerHTML = "";

    players.forEach(p=>{
        const d=document.createElement("div");
        d.className="player";
        d.innerHTML=`${p.nickname}`;
        c.appendChild(d);
    });

    updateStartButton();
}

// ================= SEND PHRASE =================
function sendPhrase(){
    const text = document.getElementById("phraseInput").value;

    ws.send(JSON.stringify({
        type:"submit_phrase",
        data:{text}
    }));

    document.getElementById("myPhrase").innerHTML =
        `<b>Твоя фраза:</b> ${text}`;
}

// ================= VOTE (NO SELF VOTE) =================
let phraseAuthorId = null;

function renderPlayers(authorId){
    phraseAuthorId = authorId;

    const c = document.getElementById("playersVote");
    c.innerHTML="";

    players.forEach(p=>{

        if(p.id === playerId) return; // ❌ нельзя голосовать за себя

        const d=document.createElement("div");
        d.className="player";

        d.innerHTML=p.nickname;

        d.onclick=()=>{
            selectedVote = p.id;

            document.querySelectorAll("#playersVote .player")
                .forEach(x=>x.classList.remove("selected"));

            d.classList.add("selected");
        };

        c.appendChild(d);
    });
}

function sendVote(){
    ws.send(JSON.stringify({
        type:"vote",
        data:{voted_player_id:selectedVote}
    }));
}

// ================= START =================
function startGame(){
    if(!isHost) return;
    ws.send(JSON.stringify({type:"start_game"}));
}

// ================= NAV =================
function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// ================= CREATE / JOIN =================
async function createRoom(){
    const res = await fetch("/api/rooms/create",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({host_nickname:document.getElementById("nickname").value})
    });

    const data = await res.json();

    roomCode=data.room_code;
    playerId=data.player_id;
    isHost=true;

    document.getElementById("roomCodeDisplay").innerText=roomCode;

    connectWS();
    show("lobby");
    updateLobby();
}

async function joinRoom(){
    const res = await fetch("/api/rooms/join",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            nickname:document.getElementById("nickname").value,
            room_code:document.getElementById("roomCode").value
        })
    });

    const data = await res.json();

    roomCode=document.getElementById("roomCode").value;
    playerId=data.player_id;
    isHost=false;

    connectWS();
    show("lobby");
    updateLobby();
}

</script>

</body>
</html>
